<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generatore Badge Univaq</title>
    <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            background-color: #f0f2f5;
            color: #333;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 100%;
        }
        h1 { font-size: 1.2rem; text-align: center; margin-bottom: 1.5rem; }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #005596;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background-color: #003d6b; }
        canvas { display: none; } /* Nascosto, serve solo per il processing */
        #preview {
            margin-top: 20px;
            width: 100%;
            border: 1px solid #ddd;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Generatore Badge Igienista</h1>
    <input type="text" id="nome" placeholder="Nome">
    <input type="text" id="cognome" placeholder="COGNOME">
    <button onclick="generatePDF()">Genera PDF (4 Badge)</button>
    <p style="font-size: 0.8rem; color: #666; text-align: center;">Il PDF sarà in formato A4 con 4 badge.</p>
</div>

<canvas id="badgeCanvas"></canvas>

<script>
    async function generatePDF() {
        const { jsPDF } = window.jspdf;
        const nome = document.getElementById('nome').value.trim();
        const cognome = document.getElementById('cognome').value.trim().toUpperCase();
        
        if (!nome || !cognome) {
            alert("Inserisci sia nome che cognome");
            return;
        }

        const fullName = `${nome} ${cognome}`;
        const canvas = document.getElementById('badgeCanvas');
        const ctx = canvas.getContext('2d');
        const img = new Image();
        
        // Carica il template
        img.src = 'badge_template.jpg';
        
        img.onload = function() {
            // Dimensioni canvas basate sull'immagine
            canvas.width = img.width;
            canvas.height = img.height;
            
            // Disegna l'immagine di sfondo
            ctx.drawImage(img, 0, 0);
            
            // Impostazioni Testo
            const fontSize = 75; // Dimensione base
            ctx.fillStyle = "black";
            ctx.textAlign = "center";
            ctx.font = `700 ${fontSize}px 'Atkinson Hyperlegible'`;

            // Controllo lunghezza e ridimensionamento (Auto-fit)
            let currentFontSize = fontSize;
            const maxWidth = canvas.width * 0.8; // Massimo 80% della larghezza del badge
            
            while (ctx.measureText(fullName).width > maxWidth && currentFontSize > 20) {
                currentFontSize -= 2;
                ctx.font = `700 ${currentFontSize}px 'Atkinson Hyperlegible'`;
            }

            // Posizionamento verticale: regolalo in base al tuo template
            // In questo template, lo spazio vuoto è sotto la linea grigia sottile
            ctx.fillText(fullName, canvas.width / 2, canvas.height * 0.82);

            // Generazione PDF
            const badgeData = canvas.toDataURL('image/jpeg', 1.0);
            const pdf = new jsPDF('p', 'mm', 'a4');
            
            // Dimensioni standard biglietto da visita: 85x55mm
            const bW = 85;
            const bH = 55;
            
            // Coordinate per 4 badge centrati nel foglio
            const positions = [
                { x: 15, y: 20 },
                { x: 110, y: 20 },
                { x: 15, y: 80 },
                { x: 110, y: 80 }
            ];

            positions.forEach(pos => {
                pdf.addImage(badgeData, 'JPEG', pos.x, pos.y, bW, bH);
            });

            pdf.save(`Badge_${cognome}.pdf`);
        };

        img.onerror = function() {
            alert("Errore: Assicurati che 'badge_template.jpg' sia nella stessa cartella del file HTML.");
        };
    }
</script>

</body>
</html>
